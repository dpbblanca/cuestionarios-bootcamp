<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Maven</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }
  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }
  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }
  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    cursor:pointer; text-align:left; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }
  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted);}
  .points b { color:var(--primary); }
  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }
  .btn {
    display:inline-block; padding:12px 20px;
    background:#0284c7; border-radius:10px; margin-top:18px;
    font-weight:bold; color:white; cursor:pointer;
    transition:.2s;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>📦 Cuestionario · Maven</h1>
  <p class="sub">Gestión de dependencias · Ciclo de vida · Plugins · Repositorios · POM</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando...</div>
    <div id="options"></div>
    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px;">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <!-- botón se añade por JS -->
  </div>

</div>

<script>
// ==============================
//          PREGUNTAS MAVEN
// ==============================
const QUIZ = {
  meta: { title:"Maven" },
  items: [
    { q:"¿Qué es Maven?",
      o:["Un servidor web","Un sistema de compilación y gestión de dependencias","Un IDE","Un framework de persistencia"], a:1 },

    { q:"Archivo principal de configuración de Maven:",
      o:["build.json","maven.yml","pom.xml","project.config"], a:2 },

    { q:"¿Qué contiene el POM?",
      o:["Solo dependencias","Dependencias, plugins, versión, empaquetado, repositorios...","Solo configuración del IDE","Datos de la base de datos"], a:1 },

    { q:"¿Qué hace 'mvn clean'?",
      o:["Compila el proyecto","Elimina la carpeta target","Publica en un repositorio","Ejecuta tests"], a:1 },

    { q:"¿Qué comando compila el proyecto?",
      o:["mvn start","mvn compile","mvn begin","mvn pack"], a:1 },

    { q:"¿Qué comando ejecuta tests?",
      o:["mvn test","mvn run-tests","mvn verify-tests","mvn unit"], a:0 },

    { q:"¿Qué comando ejecuta todo el ciclo de vida hasta el empaquetado?",
      o:["mvn clean","mvn install","mvn compile-only","mvn deps"], a:1 },

    { q:"¿Qué es un 'dependency scope'?",
      o:["Un formato JSON","Cuándo y dónde está disponible una dependencia","Un tipo de repositorio","Una versión temporal"], a:1 },

    { q:"¿Qué scope es por defecto?",
      o:["runtime","provided","test","compile"], a:3 },

    { q:"¿Para qué sirve 'mvn package'?",
      o:["Instala dependencias","Crea el artefacto (.jar/.war)","Ejecuta código","Arranca el servidor"], a:1 },

    { q:"¿Dónde busca Maven dependencias primero?",
      o:["En el repositorio central","En el repositorio local ~/.m2","En GitHub","En Docker Hub"], a:1 },

    { q:"Un plugin en Maven...",
      o:["Es un repositorio externo","Añade funcionalidades al ciclo de vida","Es una dependencia opcional","Es una base de datos"], a:1 }
  ]
};

// ==============================
//          MOTOR DEL TEST
// ==============================
let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;

  const box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//             FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";

  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  enviarResultadosMicrosoftForms();

  // botón volver al inicio (JAVASCRIPT = INFALIBLE)
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  res.appendChild(volver);
}

// ==============================
//      ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno=prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl=
"https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data=new FormData();
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);             // Nombre
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);  // Cuestionario
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);             // Aciertos
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);           // Puntos
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString()); // Fecha

  fetch(formUrl,{method:"POST",mode:"no-cors",body:data});
}

// inicio
mostrar();
</script>

</body>
</html>
