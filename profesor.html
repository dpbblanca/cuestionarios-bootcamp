<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Profesor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 40px; }
        .error-box { background: #450a0a; border: 1px solid #ef4444; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: left; }
        th { background: #1e293b; color: #7dd3fc; }
        .btn { background: #38bdf8; color: #0f172a; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>👨‍🏫 Panel del Profesor</h1>
    <button class="btn" onclick="cargarDatos()">🔄 Forzar Carga de Datos</button>
    
    <div id="error-display" class="error-box"></div>

    <table>
        <thead>
            <tr>
                <th>Alumno</th>
                <th>Examen</th>
                <th>Puntos</th>
            </tr>
        </thead>
        <tbody id="tabla-cuerpo">
            <tr><td colspan="3" id="estado">Cargando...</td></tr>
        </tbody>
    </table>

<script>
    const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function cargarDatos() {
        const errorDisplay = document.getElementById('error-display');
        const estado = document.getElementById('estado');
        const tbody = document.getElementById('tabla-cuerpo');

        try {
            // CONSULTA MÁS SIMPLE POSIBLE
            const { data, error } = await _supabase.from('resultados').select('*');

            if (error) {
                errorDisplay.style.display = "block";
                errorDisplay.innerHTML = "<b>Error de Supabase:</b> " + error.message;
                estado.textContent = "Error al cargar.";
                return;
            }

            if (data.length === 0) {
                estado.textContent = "La tabla está conectada pero está VACÍA.";
            } else {
                tbody.innerHTML = data.map(i => `
                    <tr>
                        <td>${i.alumno || '---'}</td>
                        <td>${i.examen || '---'}</td>
                        <td>${i.nota || 0}</td>
                    </tr>
                `).join('');
            }

        } catch (e) {
            errorDisplay.style.display = "block";
            errorDisplay.textContent = "Error de conexión: " + e.message;
        }
    }

    // Ejecutar nada más entrar
    cargarDatos();
</script>
</body>
</html>
