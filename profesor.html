<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel del Profesor · Academy Java</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { 
    --bg:#0f172a; --card:#1e293b; --primary:#7dd3fc; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8;
  }
  body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 40px; }
  .container { max-width: 1000px; margin: auto; }
  h1 { color: var(--primary); border-bottom: 2px solid #334155; padding-bottom: 10px; }
  .controls { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; }
  input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; }
  th { background: #334155; color: var(--primary); padding: 15px; text-align: left; }
  td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .badge { background: #0f172a; color: var(--accent); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
  .btn { background: var(--accent); color: var(--bg); border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="container">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>👨‍🏫 Panel del Profesor</h1>
    <button class="btn" onclick="fetchData()">🔄 Actualizar</button>
  </div>

  <div class="controls">
    <input type="text" id="buscador" placeholder="Buscar alumno..." oninput="filtrar()">
  </div>

  <table>
    <thead>
      <tr>
        <th>Alumno</th>
        <th>Examen</th>
        <th>Puntos</th>
        <th>Fecha</th>
      </tr>
    </thead>
    <tbody id="lista-resultados">
      <tr><td colspan="4" style="text-align:center;">Cargando...</td></tr>
    </tbody>
  </table>
</div>

<script>
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let datosLocales = [];

async function fetchData() {
  const { data, error } = await _supabase
    .from('resultados')
    .select('*')
    .order('created_at', { ascending: false });

  if (!error) {
    datosLocales = data;
    render(data);
  }
}

function render(lista) {
  const body = document.getElementById('lista-resultados');
  body.innerHTML = lista.map(res => `
    <tr>
      <td><strong>${res.alumno}</strong></td>
      <td><span class="badge">${res.examen.toUpperCase()}</span></td>
      <td style="color:${res.nota >= 700 ? '#4ade80' : '#e2e8f0'}">${res.nota} pts</td>
      <td style="color:var(--muted); font-size:0.8rem;">${new Date(res.created_at).toLocaleString()}</td>
    </tr>
  `).join('');
}

function filtrar() {
  const term = document.getElementById('buscador').value.toLowerCase();
  const filtrados = datosLocales.filter(d => d.alumno.toLowerCase().includes(term));
  render(filtrados);
}

fetchData();
</script>
</body>
</html>
