<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Docker</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #e2e8f0;
    font-family: Arial, sans-serif;
    margin: 0; padding: 40px 20px;
    display: flex; justify-content: center;
  }
  .wrap{ width:100%; max-width:700px; }
  h1{ font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub{ color:var(--muted); text-align:center; margin:0 0 20px; }

  .card{
    background: var(--panel);
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border: 1px solid rgba(255,255,255,.1);
  }

  .btn{
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    text-decoration:none; transition:background .2s;
    cursor:pointer;
  }
  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

<h1>🐳 Cuestionario · Docker</h1>
<p class="sub">Imágenes · Contenedores · Comandos básicos</p>

<div class="card" id="quiz-card">
  <div id="qtext">Cargando…</div>
  <div id="options"></div>

  <div class="row">
    <div id="counter">Pregunta 0/0</div>
    <div class="points">Puntos: <b id="points">0</b></div>
  </div>
</div>

<div class="result" id="result" style="display:none;">
  <h2>🎉 ¡Has terminado!</h2>
  <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
  <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>

  <!-- BOTÓN INFALIBLE -->
  <button onclick="location.href='index.html'" class="btn">⬅️ Volver al inicio</button>
</div>

</div>

<script>
// ==============================
//       PREGUNTAS DOCKER
// ==============================
const QUIZ = {
  meta: { title:"Docker" },
  items: [
    { q:"¿Cuál es una diferencia clave entre contenedores y máquinas virtuales?",
      o:["Las VMs consumen menos recursos","Los contenedores comparten el kernel del host","Los contenedores necesitan hipervisor","Las VMs no ejecutan apps"], a:1 },

    { q:"¿Qué comando construye una imagen desde un Dockerfile?",
      o:["docker run","docker exec","docker build","docker pull"], a:2 },

    { q:"¿Qué hace 'docker run'?",
      o:["Compila imagen","Inicia contenedor","Elimina contenedor","Actualiza contenedor"], a:1 },

    { q:"¿Qué comando ejecuta algo dentro de un contenedor?",
      o:["docker start","docker exec","docker logs","docker ps"], a:1 },

    { q:"¿Qué comando lista los contenedores?",
      o:["docker logs","docker ps","docker start","docker build"], a:1 },

    { q:"¿Qué archivo define la imagen personalizada?",
      o:["docker-compose","Dockerfile","Volumen","Registro"], a:1 },

    { q:"¿Para qué sirve 'docker volume'?",
      o:["Imágenes","Datos persistentes","Crear contenedores","Ejecutar comandos"], a:1 },

    { q:"¿Qué comando sube una imagen al registro remoto?",
      o:["docker exec","docker install","docker fetch","docker push"], a:3 },

    { q:"¿Qué hace 'docker pull'?",
      o:["Inicia contenedor","Ejecuta comando","Descarga imagen","Construye imagen"], a:2 },

    { q:"¿Qué comando muestra logs del contenedor?",
      o:["docker volume","docker ps","docker logs","docker image"], a:2 },

    { q:"¿Qué lista imágenes del sistema?",
      o:["docker ps","docker images","docker logs","docker network"], a:1 },

    { q:"¿Qué comando detiene un contenedor?",
      o:["docker exec","docker stop","docker pull","docker ps"], a:1 },

    { q:"¿Qué hace 'docker start'?",
      o:["Inicia contenedor detenido","Elimina imagen","Construye imagen","Crea red"], a:0 },

    { q:"¿Qué comando borra una imagen?",
      o:["docker pull","docker rmi","docker stop","docker exec"], a:1 }
  ]
};

// ==============================
//       MOTOR DEL QUIZ
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((txt, idx)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = txt;
    b.onclick = ()=> responder(idx);
    box.appendChild(b);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

function final(){
  document.getElementById("quiz-card").style.display = "none";
  document.getElementById("result").style.display = "block";

  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent = hits;
  document.getElementById("r_total").textContent = QUIZ.items.length;

  enviarResultadosMicrosoftForms();
}

// ==============================
//       ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){

  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl = "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();

  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl, {
    method: "POST",
    mode: "no-cors",
    body: data
  });
}

mostrar();
</script>

</body>
</html>
