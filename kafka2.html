<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Kafka 2 (Profundización)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    cursor:pointer; font-size:16px; text-align:left;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s; border:none; text-decoration:none;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>⚙️ Cuestionario · Kafka 2 (Profundización)</h1>
  <p class="sub">ISR · Líder/Réplicas · Rebalance · Entregas · Offsets</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta: { title:"kafka2" }, // Identificador para la tabla de resultados
  items: [
    { q:"En un topic replicado, ¿qué broker acepta escrituras de productores?", o:["Cualquier réplica","El líder de la partición","El controlador del clúster","Solo el broker 0"], a:1 },
    { q:"¿Qué es el ISR (In‑Sync Replicas)?", o:["Todas las réplicas existentes","Réplicas sincronizadas con el líder dentro del umbral de lag","Réplicas caídas","Solo el líder"], a:1 },
    { q:"Si 'acks=all' está configurado…", o:["El productor no espera confirmación","Espera al líder únicamente","Espera al líder y a todas las réplicas en ISR","Espera a todos los brokers del clúster"], a:2 },
    { q:"¿Qué ocurre en un rebalance de un consumer group?", o:["Los consumidores comparten todas las particiones a la vez","Se redistribuyen particiones entre consumidores activos del grupo","Se borran offsets","Se pausa la producción"], a:1 },
    { q:"¿Qué política de entrega garantiza que un mensaje se procesa 0 o 1 vez?", o:["At‑most‑once","At‑least‑once","Exactly‑once","Best‑effort"], a:0 },
    { q:"Para minimizar duplicados en at‑least‑once, es clave…", o:["No usar commits","Procesar y luego commit de offset","Commit del offset antes de procesar","Desactivar auto‑commit y nunca commitear"], a:1 },
    { q:"Exactly‑once semantics (EOS) en Kafka se logra combinando…", o:["Idempotent producer + transactional producer + transactional consumer","Solo acks=all","Solo idempotent producer","Solo consumer groups"], a:0 },
    { q:"Un producer idempotente…", o:["Evita duplicados de reintentos en el productor","Ordena globalmente el topic","Desactiva la replicación","Requiere Zookeeper"], a:0 },
    { q:"El commit de offsets en un consumer…", o:["Es siempre automático","Puede ser manual (sync/async) y/o automático","No existe en Kafka","Solo se hace al cerrar"], a:1 },
    { q:"¿Dónde se guardan por defecto los offsets de un consumer group?", o:["En cada broker en disco ‘/tmp’","En un topic interno __consumer_offsets","En Zookeeper","En memoria del cliente"], a:1 },
    { q:"Si un consumidor es muy lento y aumenta el lag…", o:["Se expulsará del grupo tras session.timeout.ms si no envía heartbeats","No pasa nada","El líder migra al consumidor","Se borran sus offsets"], a:0 },
    { q:"Para reintentos y orden por clave en una partición, conviene…", o:["Cambiar la clave de partición en cada envío","Usar la misma key y controlar reintentos en el productor","Rond‑robin siempre","Enviar sin key"], a:1 }
  ]
};

let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta " + (i+1) + " / " + QUIZ.items.length;
  document.getElementById("points").textContent = points;
  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;
  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent = hits;
  document.getElementById("r_total").textContent = QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'kafka2' });
      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnBox = document.getElementById("btn-container");
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  btnBox.appendChild(volver);
}

mostrar();
</script>
</body>
</html>
