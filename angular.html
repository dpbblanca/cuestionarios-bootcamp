<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Angular</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial, sans-serif;
    margin:0; padding:40px 20px; display:flex; justify-content:center;
  }

  .wrap{ width:100%; max-width:700px; }

  h1{ font-size:32px; text-align:center; color:var(--primary); margin:0 0 12px; }
  .sub{ text-align:center; color:var(--muted); margin-bottom:20px; }

  .card{
    background:var(--panel);
    padding:24px; border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px;
    color:white; cursor:pointer; text-align:left; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn{
    padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px;
    font-weight:bold; color:white; cursor:pointer;
    transition:.2s; border:none;
  }
  .btn:hover{ background:#38bdf8; }
</style>

</head>
<body>
<div class="wrap">

  <h1>🅰️ Cuestionario · Angular</h1>
  <p class="sub">Componentes · Módulos · Servicios · DI · Routing · Pipes · Lifecycle Hooks</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
  </div>

</div>

<script>
// ==============================
//           PREGUNTAS ANGULAR
// ==============================
const QUIZ = {
  meta:{ title:"Angular" },
  items:[
    { q:"Angular es…",
      o:["Una librería para la vista","Un framework completo de front‑end basado en TypeScript","Un compilador de HTML","Un microservicio"], a:1 },

    { q:"¿Qué define un componente en Angular?",
      o:["Una función","Una clase con @Component","Un archivo JSON","Un módulo"], a:1 },

    { q:"¿Qué contiene el decorador @Component?",
      o:["Selector, template, estilos, metadata","Solo variables","Solo servicios","Solo rutas"], a:0 },

    { q:"Los servicios en Angular se anotan con…",
      o:["@Inject","@NgModule","@Service o @Injectable","@Provider"], a:2 },

    { q:"El sistema de DI (Inyección de Dependencias) de Angular…",
      o:["Crea manualmente instancias","Gestiona objetos según el injector y providers","Es opcional y no se usa","Requiere Java"], a:1 },

    { q:"¿Qué es un módulo (NgModule)?",
      o:["Un archivo CSS","Una agrupación lógica de componentes, servicios, pipes…","Un servidor web","Un Observable"], a:1 },

    { q:"¿Qué fichero arranca toda la app?",
      o:["main.ts","index.html","angular.json","app.config"], a:0 },

    { q:"¿Qué hace el router de Angular?",
      o:["Gestiona logs","Navegación de componentes basada en rutas","Genera CSS","Cierra conexiones"], a:1 },

    { q:"¿Cómo se representa típicamente una ruta?",
      o:["{path:'home', component:HomeComponent}","route(home)","goto(home)","url => home"], a:0 },

    { q:"¿Qué son los Lifecycle Hooks?",
      o:["Eventos del navegador","Métodos especiales llamados en momentos clave del ciclo de vida de un componente","Errores del servidor","Operadores de RxJS"], a:1 },

    { q:"¿Qué hook se usa al inicializar un componente?",
      o:["ngCreate","ngOnStart","ngOnInit","ngBegin"], a:2 },

    { q:"¿Qué hook se usa para limpiar suscripciones?",
      o:["ngOnFinish","ngDestroy","ngDispose","ngStop"], a:1 },

    { q:"¿Qué es un Pipe?",
      o:["Una forma de acceder a datos del servidor","Una transformación de datos en plantillas ({{ }})","Un servicio de logs","Un módulo"], a:1 },

    { q:"Pipe para formato de fechas:",
      o:["date","lowercase","slice","format"], a:0 },

    { q:"¿Qué se usa para trabajar con async data en plantillas?",
      o:["syncPipe","asyncPipe","awaitPipe","promisePipe"], a:1 }
  ]
};

// ==============================
//             MOTOR
// ==============================
let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta "+(i+1)+" / "+QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;

  const box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//              FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";

  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  enviarResultadosMicrosoftForms();

  // Botón infalible
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  res.appendChild(volver);
}

// ==============================
//    ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno = prompt("Introduce tu nombre para enviar los resultados:");

  const formUrl =
"https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl,{method:"POST",mode:"no-cors",body:data});
}

// start
mostrar();
</script>

</body>
</html>
