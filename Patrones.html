<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Patrones de diseño</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial, sans-serif;
    margin:0; padding:40px 20px; display:flex; justify-content:center;
  }
  .wrap{ width:100%; max-width:700px; }
  h1{ font-size:32px; text-align:center; color:var(--primary); margin:0 0 12px; }
  .sub{ text-align:center; color:var(--muted); margin-bottom:20px; }
  .card{
    background:var(--panel); padding:24px; border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,.45); backdrop-filter:blur(6px);
  }
  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }
  .opt{
    width:100%; padding:14px; margin:8px 0; background:#334155; border:none; border-radius:12px;
    color:white; cursor:pointer; text-align:left; font-size:16px; transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }
  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }
  .result{
    margin-top:20px; padding:24px; text-align:center; background:#1e293b;
    border-radius:12px; border:1px solid rgba(255,255,255,.1);
  }
  .btn{
    padding:12px 20px; background:#0284c7; border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s; border:none; text-decoration: none; display: inline-block;
  }
  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🧠 Cuestionario · Patrones de diseño</h1>
  <p class="sub">Creacionales · Estructurales · Comportamiento · Principios SOLID</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>
    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta: { title:"Patrones" }, // Asegúrate de que coincida con el nombre que pasas en index.html
  items: [
    { q:"¿Qué agrupa mejor a Factory Method, Abstract Factory, Builder, Prototype, Singleton?", o:["Estructurales","Comportamiento","Creacionales","Arquitectónicos"], a:2 },
    { q:"¿Cuál es la motivación de Singleton?", o:["Permitir varias instancias siempre","Garantizar una única instancia global accesible de forma controlada","Eliminar dependencias","Crear objetos complejos por pasos"], a:1 },
    { q:"Diferencia clave entre Factory Method y Abstract Factory:", o:["Factory Method crea familias; Abstract Factory crea una sola instancia","Factory Method delega creación en subclases; Abstract Factory provee familias de productos relacionados","No hay diferencia","Abstract Factory no usa interfaces"], a:1 },
    { q:"Builder es útil cuando…", o:["La creación es simple","Hay muchos parámetros opcionales y queremos construir paso a paso","Queremos una única instancia global","Queremos adaptar una interfaz"], a:1 },
    { q:"Adapter sirve para…", o:["Convertir la interfaz de una clase en otra esperada por el cliente","Dividir un objeto en subobjetos","Decorarlo con responsabilidades adicionales","Ocultar implementación detrás de una fachada simple"], a:0 },
    { q:"Decorator añade…", o:["Estados compartidos globales","Responsabilidades de forma flexible envolviendo el objeto","Herencia múltiple","Sincronización de hilos"], a:1 },
    { q:"Composite permite…", o:["Tratar objetos individuales y composiciones de forma uniforme","Crear una fachada única","Separar abstracción de implementación","Crear estados finitos"], a:0 },
    { q:"Facade proporciona…", o:["Una API compleja y detallada","Una interfaz simple a un subsistema complejo","Instancias únicas","Observadores para eventos"], a:1 },
    { q:"Strategy se usa cuando…", o:["Necesitamos variar el algoritmo en tiempo de ejecución","Necesitamos una única instancia","Queremos notificar a varios observadores","Queremos agrupar objetos en árbol"], a:0 },
    { q:"Observer modela…", o:["Un registro activo","Dependencia uno‑a‑muchos para notificar cambios","Adaptación de interfaces","Decoración dinámica"], a:1 },
    { q:"Command encapsula…", o:["Una operación como objeto (deshacer, colas, macros)","Un evento DOM","Un hilo del SO","Una transacción de BD"], a:0 },
    { q:"SOLID: el principio OCP dice…", o:["Abierto a modificación, cerrado a extensión","Abierto a extensión, cerrado a modificación mediante abstracciones","Todo debe ser público","Las clases no deben tener constructores"], a:1 }
  ]
};

let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta "+(i+1)+" / "+QUIZ.items.length;
  document.getElementById("points").textContent  = points;
  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;
  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent = hits;
  document.getElementById("r_total").textContent = QUIZ.items.length;

  // --- ENVÍO AUTOMÁTICO A SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'Patrones' });

      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnContainer = document.getElementById("btn-container");
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  btnContainer.appendChild(volver || document.createElement('div'));
}

mostrar();
</script>
</body>
</html>
