<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Persistencia</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }
  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    cursor:pointer; text-align:left; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted);}
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px;
    font-weight:bold; color:white; cursor:pointer;
    transition:.2s; border:none; text-decoration:none;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>💾 Cuestionario · Persistencia</h1>
  <p class="sub">ORM · JPA · Entidades · Repositorios · Relaciones · Transacciones</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando...</div>
    <div id="options"></div>
    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px;">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta: { title:"persistencia" }, // ID para el match en Supabase
  items: [
    { q:"¿Qué es un ORM?", o:["Una base de datos","Un mapeador objeto‑relacional que traduce clases ↔ tablas","Un tipo de servidor web","Un motor de plantillas"], a:1 },
    { q:"¿Qué anotación marca una clase como entidad JPA?", o:["@Repository","@Entity","@Model","@DataEntity"], a:1 },
    { q:"¿Qué anotación identifica la clave primaria?", o:["@Primary","@Id","@Key","@PK"], a:1 },
    { q:"¿Qué relación corresponde a 'muchos‑a‑uno'?", o:["@OneToMany","@ManyToOne","@OneToOne","@ManyToMany"], a:1 },
    { q:"¿Qué es el contexto de persistencia?", o:["Un archivo de configuración","El conjunto de entidades gestionadas en memoria por JPA","La base de datos física","La configuración de seguridad"], a:1 },
    { q:"El estado 'managed' significa que…", o:["La entidad está sincronizada con la BD y controlada por el EntityManager","La entidad está eliminada","Nunca ha sido persistida","Es un dato inmutable"], a:0 },
    { q:"¿Cuál es la forma correcta de definir relación bidireccional OneToMany?", o:["Solo @OneToMany sin mappedBy","@OneToMany + @ManyToOne con mappedBy en el lado 'uno'","@ManyToMany por defecto","@Entity sin relaciones"], a:1 },
    { q:"¿Qué hace CascadeType.PERSIST?", o:["Elimina entidades relacionadas","Propaga persist() a entidades dependientes","Cierra conexiones","Activa logs"], a:1 },
    { q:"¿Qué hace FetchType.LAZY?", o:["Carga todo inmediatamente","Solo carga relaciones cuando se necesitan","Desactiva cache","Exige usar SQL manual"], a:1 },
    { q:"¿Qué ocurre si una entidad no tiene constructor vacío?", o:["Nada, no es necesario","JPA podría fallar al instanciarla","Solo afecta a test","La ignora"], a:1 },
    { q:"¿Qué interfaz de Spring Data se usa para CRUD básico?", o:["JpaRepository","JdbcClient","CrudController","RepositoryBean"], a:0 },
    { q:"¿Qué es una transacción?", o:["Una operación lógica que debe completarse completamente o revertirse","Un commit parcial","Una consulta sin estado","Un log de eventos"], a:0 }
  ]
};

let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta " + (i+1) + " / " + QUIZ.items.length;
  document.getElementById("points").textContent = points;
  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;
  const box=document.getElementById("options");
  box.innerHTML="";
  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";
  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'persistencia' });
      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnBox = document.getElementById("btn-container");
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{location.href="index.html";};
  btnBox.appendChild(volver);
}

mostrar();
</script>
</body>
</html>
