<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · RxJS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc;
          --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap{ width:100%; max-width:700px; }

  h1{ font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub{ color:var(--muted); text-align:center; margin:0 0 20px; }

  .card{
    background:var(--panel);
    padding:24px; border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px;
    color:white; text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted);}
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn{
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s; border:none; text-decoration:none;
  }
  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>⚡ Cuestionario · RxJS</h1>
  <p class="sub">Observables · Operadores · Subjects · Pipes · Cold/Hot · Async</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>
    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta:{ title:"rxjs" }, // ID para Supabase
  items:[
    { q:"RxJS es…", o:["Una librería de gráficos","Una librería para programación reactiva con Observables","Un motor de plantillas HTML","Un parseador XML"], a:1 },
    { q:"Un Observable es…", o:["Una promesa que nunca falla","Una colección asíncrona de valores en el tiempo","Una función pura","Un bucle infinito"], a:1 },
    { q:"¿Qué hace un Observer?", o:["Consume valores emitidos por un Observable","Crea Observables","Convierte JSON en XML","Renderiza HTML"], a:0 },
    { q:"¿Qué operador se usa para transformar valores?", o:["filter","subscribe","transform","map"], a:3 }, // Corregido el despiste del original
    { q:"¿Qué operador aplica una función a cada valor emitido?", o:["map","reduce","scan","tap"], a:0 },
    { q:"¿Qué hace 'filter'?", o:["Transforma valores","Filtra valores según una condición","Combina Observables","Gestiona errores"], a:1 },
    { q:"¿Qué es un Subject?", o:["Un Observable + Observer a la vez","Un tipo de Promise","Una API HTTP","Un motor de plantillas"], a:0 },
    { q:"¿Qué diferencia hay entre *cold* y *hot* observables?", o:["No existe diferencia","Cold produce valores por suscriptor; Hot comparte la misma fuente","Cold comparte valores; Hot crea uno por suscriptor","Cold es síncrono y Hot asíncrono"], a:1 },
    { q:"¿Para qué sirve 'pipe'?", o:["Para concatenar operadores en cadena","Para ejecutar SQL","Para parar emisiones","Para crear Observables HTTP"], a:0 },
    { q:"¿Qué operador combina varios Observables emitiendo cuando TODOS terminan?", o:["merge","concat","combineLatest","forkJoin"], a:3 },
    { q:"¿Qué operador captura errores sin romper el stream?", o:["retry","catchError","safe","block"], a:1 },
    { q:"¿Qué operador crea un Observable a partir de un array?", o:["from","toObservable","arrayToObs","make"], a:0 }
  ]
};

let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta "+(i+1)+" / "+QUIZ.items.length;
  document.getElementById("points").textContent=points;
  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;
  const box=document.getElementById("options");
  box.innerHTML="";
  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";
  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'rxjs' });
      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnBox = document.getElementById("btn-container");
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  btnBox.appendChild(volver);
}

mostrar();
</script>
</body>
</html>
