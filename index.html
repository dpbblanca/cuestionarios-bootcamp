<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Portal de Certificaciones · Fullstack Academy</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --primary:#7dd3fc; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
  body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: 1200px; }
  header { text-align: center; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 20px; }
  .btn-profesor { background: #0369a1; color: white; border: none; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s; font-size: 0.85rem; }
  .btn-profesor:hover { background: var(--accent); }

  /* Login Estilo */
  .login-box { background: var(--card); padding: 30px; border-radius: 15px; margin: 50px auto; display: flex; flex-direction: column; gap: 15px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
  input { padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; font-size: 1rem; text-align: center; }
  .btn-login { padding: 12px; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }

  /* Panel Alumno */
  #user-info { display: none; text-align: center; margin-bottom: 30px; background: rgba(125, 211, 252, 0.1); padding: 15px; border-radius: 10px; position: relative; }
  .btn-logout { position: absolute; top: 10px; right: 15px; background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; }

  /* Grid de Cuestionarios */
  .grid { display: none; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; }
  .exam-card { background: var(--card); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; cursor: pointer; text-align: center; min-height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .exam-card:hover { transform: translateY(-3px); border-color: var(--primary); background: #243147; }
  .exam-card h3 { margin: 10px 0 0 0; color: var(--primary); font-size: 0.9rem; }
  .icon { font-size: 1.4rem; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div style="width:140px"></div>
    <h1>🚀 Academy Java Fullstack</h1>
    <a href="profesor.html" class="btn-profesor">Panel Profesor</a>
  </header>

  <div class="login-box" id="login-section">
    <h3 style="margin-top:0">Identificación de Alumno</h3>
    <input type="text" id="alumno-nombre" placeholder="Tu nombre y apellidos...">
    <button class="btn-login" onclick="login()">Acceder al Portal</button>
  </div>

  <div id="user-info">
    <button class="btn-logout" onclick="logout()">Cerrar Sesión / Nuevo Alumno</button>
    <h2 id="welcome-msg" style="margin:0"></h2>
    <p style="margin:5px 0 0 0; font-size:0.9rem; color:var(--muted)">Selecciona tu examen de hoy</p>
  </div>

  <div class="grid" id="exam-grid">
    </div>
</div>

<script>
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ESTA ES TU LISTA REAL DE GITHUB - NO FALTA NINGUNO
const cuestionarios = [
  { n: 'Git', f: 'Git.html', i: '📦' },
  { n: 'Maven', f: 'Maven.html', i: '🏗️' },
  { n: 'Normalización', f: 'Normalizacion.html', i: '📐' },
  { n: 'Patrones', f: 'Patrones.html', i: '🎨' },
  { n: 'SQL 1', f: 'SQL1.html', i: '📁' },
  { n: 'SQL 2', f: 'SQL2.html', i: '📊' },
  { n: 'Webservices', f: 'Webservices.html', i: '🌐' },
  { n: 'Angular', f: 'angular.html', i: '🅰️' },
  { n: 'Architecture', f: 'architecture.html', i: '🏛️' },
  { n: 'Cliente-Servidor', f: 'cliente-servidor.html', i: '💻' },
  { n: 'Docker Compose', f: 'docker-compose.html', i: '🐙' },
  { n: 'Docker', f: 'docker.html', i: '🐳' },
  { n: 'Elastic', f: 'elastic.html', i: '🔍' },
  { n: 'Flex-Grid', f: 'flex-grid.html', i: '🍱' },
  { n: 'Frontend', f: 'frontend.html', i: '🎨' },
  { n: 'Grafana', f: 'grafana.html', i: '📈' },
  { n: 'I/O Java', f: 'io.html', i: '📂' },
  { n: 'Kafka 1', f: 'kafka1.html', i: '📨' },
  { n: 'Kafka 2', f: 'kafka2.html', i: '📡' },
  { n: 'Kafka 3', f: 'kafka3.html', i: '⚙️' },
  { n: 'Persistencia', f: 'persistencia.html', i: '💾' },
  { n: 'POO Comp.', f: 'poo-componentes.html', i: '🧩' },
  { n: 'POO', f: 'poo.html', i: '📦' },
  { n: 'RxJS', f: 'rxjs.html', i: '⚡' },
  { n: 'Scrum', f: 'scrum.html', i: '🏃' },
  { n: 'Spring Boot', f: 'spring-boot.html', i: '🚀' },
  { n: 'Spring', f: 'spring.html', i: '🍃' },
  { n: 'Testing', f: 'testing.html', i: '🧪' },
  { n: 'Java I/O', f: 'io.html', i: '📂' },
  { n: 'Architecture', f: 'architecture.html', i: '🏗️' },
  { n: 'Flex & Grid', f: 'flex-grid.html', i: '🏁' },
  { n: 'Spring Boot', f: 'spring-boot.html', i: '🍃' }
];

function renderGrid() {
  const grid = document.getElementById('exam-grid');
  // Usamos Set para evitar duplicados visuales si algún archivo se repite en la lista
  const unicos = [...new Map(cuestionarios.map(item => [item['f'], item])).values()];
  
  grid.innerHTML = unicos.map(c => `
    <div class="exam-card" onclick="comenzar('${c.f}')">
      <span class="icon">${c.i}</span>
      <h3>${c.n}</h3>
    </div>
  `).join('');
}

window.onload = () => {
  renderGrid();
  const nombre = localStorage.getItem('alumnoActivo');
  if (nombre) habilitarAcceso(nombre);
};

function login() {
  const nombre = document.getElementById('alumno-nombre').value.trim();
  if (!nombre) return alert("Por favor, introduce tu nombre para continuar.");
  localStorage.setItem('alumnoActivo', nombre);
  habilitarAcceso(nombre);
}

function logout() {
  if(confirm("¿Seguro que quieres cerrar sesión? Esto permitirá que otro alumno entre.")) {
    localStorage.removeItem('alumnoActivo');
    location.reload();
  }
}

function habilitarAcceso(nombre) {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('user-info').style.display = 'block';
  document.getElementById('exam-grid').style.display = 'grid';
  document.getElementById('welcome-msg').textContent = "Alumno: " + nombre;
}

async function comenzar(archivo) {
  const alumno = localStorage.getItem('alumnoActivo');
  const idExamen = archivo.replace('.html', '');
  await _supabase.from('resultados').upsert({ alumno, examen: idExamen, nota: 0 }, { onConflict: 'alumno,examen' });
  location.href = archivo;
}
</script>
</body>
</html>
