<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consola General de Cuestionarios</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg1:#0f172a; --bg2:#1e293b; --primary:#7dd3fc; --muted:#94a3b8; }
        body { background: linear-gradient(135deg,var(--bg1),var(--bg2)); font-family: Arial; color:white; padding:40px 20px; }
        .container { max-width:720px; margin:0 auto; }
        h1 { text-align:center; color:var(--primary); }
        .box { background:#1e293b; padding:20px; border-radius:10px; border:1px solid var(--primary); margin-bottom:30px; text-align:center; }
        input { padding:10px; width:80%; border-radius:5px; border:none; margin-top:10px; }
        h2 { color:var(--primary); border-left:5px solid var(--primary); padding-left:10px; margin-top:30px; }
        .grid { display:grid; gap:10px; }
        .item { padding:15px; background:#1e293b; border-radius:10px; color:white; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:0.3s; }
        .item:hover { background:#334155; transform:translateX(8px); border-color:var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Menú de Cuestionarios</h1>
    <div class="box">
        <label>Introduce tu nombre:</label><br>
        <input type="text" id="nombreAlumno" placeholder="Tu nombre aquí...">
    </div>

    <h2>🟦 Observabilidad & DevOps</h2>
    <div class="grid">
        <div onclick="registrar('Grafana')" class="item">📊 Grafana</div>
        <div onclick="registrar('Elastic')" class="item">🔎 Elastic (ELK)</div>
        <div onclick="registrar('Docker')" class="item">🐳 Docker</div>
        <div onclick="registrar('Docker Compose')" class="item">📦 Docker Compose</div>
    </div>

    <h2>🟨 Bases de datos & SQL</h2>
    <div class="grid">
        <div onclick="registrar('SQL 1')" class="item">📝 SQL 1</div>
        <div onclick="registrar('SQL 2')" class="item">📘 SQL 2</div>
        <div onclick="registrar('Normalización')" class="item">📐 Normalización</div>
    </div>

    <h2>🟩 Backend (Java & Spring)</h2>
    <div class="grid">
        <div onclick="registrar('Spring')" class="item">🌱 Spring</div>
        <div onclick="registrar('Spring Boot')" class="item">🚀 Spring Boot</div>
        <div onclick="registrar('Webservices')" class="item">🔗 Webservices</div>
    </div>

    <h2>🟥 Kafka</h2>
    <div class="grid">
        <div onclick="registrar('Kafka 1')" class="item">🧩 Kafka 1</div>
        <div onclick="registrar('Kafka 2')" class="item">⚙️ Kafka 2</div>
    </div>

    <h2>🟫 Metodologías</h2>
    <div class="grid">
        <div onclick="registrar('Scrum')" class="item">🌀 Scrum</div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function registrar(examen) {
        const nombre = document.getElementById('nombreAlumno').value.trim();
        if (!nombre) { alert("⚠️ Escribe tu nombre"); return; }

        const { error } = await _supabase
            .from('resultados')
            .insert([{ alumno: nombre, examen: examen, nota: 0 }]);

        if (error) {
            alert("❌ ERROR: " + error.message + "\n\nRevisa si la tabla se llama 'resultados' en Supabase.");
        } else {
            alert("✅ ¡Éxito! Registrado: " + nombre + " en " + examen);
            // Aquí puedes redirigir si tienes el archivo:
            // window.location.href = examen.toLowerCase() + ".html";
        }
    }
</script>
</body>
</html>
