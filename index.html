<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consola de Cuestionarios - Base de Datos</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg1:#0f172a;
            --bg2:#1e293b;
            --panel:#1e293b;
            --hover:#334155;
            --primary:#7dd3fc;
            --muted:#94a3b8;
        }

        body {
            background: linear-gradient(135deg, var(--bg1), var(--bg2));
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 720px;
            width: 100%;
        }

        h1 { color: var(--primary); text-align: center; font-size: 32px; }

        /* Caja de identificación */
        .login-box {
            background: var(--panel);
            padding: 25px;
            border-radius: 15px;
            border: 1px solid var(--primary);
            margin-bottom: 30px;
            text-align: center;
        }

        input {
            width: 80%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            outline: none;
        }

        h2 {
            color: var(--primary);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin-top: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Botones de examen */
        .item {
            display: block;
            padding: 16px;
            background: var(--panel);
            border-radius: 12px;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.3s;
            cursor: pointer;
            font-size: 18px;
        }

        .item:hover {
            background: var(--hover);
            transform: translateX(8px);
            border-color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 Sistema de Cuestionarios</h1>
        
        <div class="login-box">
            <label style="color: var(--muted);">Escribe tu nombre para empezar:</label><br>
            <input type="text" id="nombreAlumno" placeholder="Ej: Tu Nombre Completo">
        </div>

        <h2>🟦 Módulos de Observabilidad</h2>
        <div class="grid">
            <div class="item" onclick="registrarYEntrar('Grafana')">📊 Grafana</div>
            <div class="item" onclick="registrarYEntrar('Elastic ELK')">🔎 Elastic (ELK)</div>
            <div class="item" onclick="registrarYEntrar('Docker')">🐳 Docker</div>
        </div>

        <h2>🟨 Bases de Datos</h2>
        <div class="grid">
            <div class="item" onclick="registrarYEntrar('SQL 1')">📝 SQL 1</div>
            <div class="item" onclick="registrarYEntrar('SQL 2')">📘 SQL 2</div>
        </div>
    </div>

    <script>
        // --- TU CONFIGURACIÓN DE SUPABASE ---
        const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function registrarYEntrar(nombreExamen) {
            const nombre = document.getElementById('nombreAlumno').value.trim();

            if (!nombre) {
                alert("⚠️ Por favor, introduce tu nombre primero.");
                return;
            }

            // GUARDAR EN LA BASE DE DATOS
            const { error } = await _supabase
                .from('resultados')
                .insert([{ 
                    alumno: nombre, 
                    examen: nombreExamen, 
                    nota: 0 
                }]);

            if (error) {
                console.error("Error detallado:", error);
                alert("❌ Error al conectar con la base de datos: " + error.message);
            } else {
                alert("✅ Registro exitoso para " + nombre + ".\nIniciando examen de " + nombreExamen);
                // Aquí podrías añadir una línea para abrir el examen real:
                // window.location.href = nombreExamen.toLowerCase() + ".html";
            }
        }
    </script>
</body>
</html>
