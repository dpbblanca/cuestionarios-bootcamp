<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Kafka 1 (Fundamentos)</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155;
    border:none; border-radius:12px; color:white;
    cursor:pointer; font-size:16px; text-align:left;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🧩 Cuestionario · Kafka 1 (Fundamentos)</h1>
  <p class="sub">Brokers · Topics · Partitions · Producers/Consumers · Durabilidad</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <!-- El botón “Volver al inicio” se añade por JS (infalible) -->
  </div>

</div>

<script>
// ==============================
//       PREGUNTAS KAFKA 1
// ==============================
const QUIZ = {
  meta: { title:"Kafka 1 (Fundamentos)" },
  items: [
    { q:"Kafka es principalmente…",
      o:["Un SGBD relacional","Una plataforma de streaming de eventos distribuida","Un orquestador de contenedores","Un sistema de colas en memoria sin disco"], a:1 },

    { q:"¿Qué es un *topic* en Kafka?",
      o:["Una instancia de broker","Un flujo categorizado de registros (eventos)","Un grupo de consumidores","Un proceso del SO"], a:1 },

    { q:"¿Para qué sirven las *partitions*?",
      o:["Para limitar el tamaño del clúster","Para paralelizar y escalar el *throughput* de un topic","Para almacenar configuración","Para aislar Zookeeper"], a:1 },

    { q:"El *offset* en Kafka es…",
      o:["El ID del broker","La versión del cliente","La posición ordenada de un registro dentro de una partición","El tamaño en bytes del batch"], a:2 },

    { q:"Orden de los mensajes en Kafka:",
      o:["Global para todo el topic","Por partición","Indefinido siempre","Solo por grupo de consumidor"], a:1 },

    { q:"¿Qué es un *consumer group*?",
      o:["Todos los brokers del clúster","Varios consumidores que cooperan y comparten particiones de un topic","Una réplica de un topic","Un índice secundario"], a:1 },

    { q:"Replicación en Kafka:",
      o:["Se define por *replication factor* del topic","No existe","Siempre es 1","Solo funciona en modo lectura"], a:0 },

    { q:"Durabilidad del productor (acks):",
      o:["acks=0 confirma sin enviar","acks=1 confirma al líder","acks=all espera al líder y réplicas sincronizadas (ISR)","acks=none confirma al consumidor"], a:2 },

    { q:"¿Qué hace un *idempotent producer*?",
      o:["Evita duplicados desde el productor en fallos y reintentos","Duplica mensajes para resiliencia","Genera offsets globales","Desactiva la confirmación"], a:0 },

    { q:"Retención en Kafka:",
      o:["Siempre borra al consumir","Controla cuanto tiempo/tamaño se conservan los registros en disco","Solo existe en memoria","Se resetea con cada reinicio"], a:1 },

    { q:"En versiones actuales, ¿qué componente reemplaza a ZooKeeper como *controller* del clúster?",
      o:["KRaft (Kafka Raft)","Etcd","Consul","Nada, sigue ZooKeeper"], a:0 },

    { q:"Elegir la afirmación correcta:",
      o:["Un topic tiene múltiples particiones; un consumidor de un grupo puede leer varias particiones","Un topic solo puede tener 1 partición","Las particiones no se pueden replicar","Un grupo de consumidores no puede escalar"], a:0 }
  ]
};

// ==============================
//            MOTOR
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//            FINAL
// ==============================
function final(){
  // Mostrar resultados
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";

  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent   = hits;
  document.getElementById("r_total").textContent  = QUIZ.items.length;

  // Enviar a Microsoft Forms
  enviarResultadosMicrosoftForms();

  // Botón "Volver al inicio" — creado por JS (INFALIBLE)
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  res.appendChild(volver);
}

// ==============================
//   ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl =
    "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  // IDs confirmados de tu Form:
  // Nombre | Cuestionario | Aciertos | Puntos | FechaHora
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl, { method:"POST", mode:"no-cors", body:data });
}

// Arranque
mostrar();
</script>

</body>
</html>
