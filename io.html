<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Entrada/Salida (I/O)</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { 
    --bg1:#0f172a; --bg2:#1e293b;
    --muted:#94a3b8; --primary:#7dd3fc; 
    --panel:rgba(30,41,59,0.85);
  }

  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }

  .wrap { width:100%; max-width:700px; }

  h1 { font-size:32px; text-align:center; color:var(--primary); margin:0 0 12px; }
  .sub { text-align:center; color:var(--muted); margin-bottom:20px; }

  .card{
    background:var(--panel); padding:24px;
    border-radius:18px; box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px;
    color:white; cursor:pointer; text-align:left;
    font-size:16px; transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn{
    padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px;
    font-weight:bold; color:white; cursor:pointer;
    transition:.2s; border:none; text-decoration:none;
    display: inline-block;
  }
  .btn:hover{ background:#38bdf8; }
</style>

</head>
<body>
<div class="wrap">

  <h1>📂 Cuestionario · Entrada / Salida (I/O)</h1>
  <p class="sub">Streams · Buffers · Ficheros · Lectura/Escritura · Binario vs Texto</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta:{ title:"io" }, // ID para Supabase
  items:[
    { q:"¿Qué es un stream?", o:["Una tabla de BD","Un flujo secuencial de datos que se pueden leer o escribir","Una API web","Un tipo de variable"], a:1 },
    { q:"¿Qué diferencia hay entre un fichero de texto y uno binario?", o:["Texto usa codificación (UTF‑8), binario son bytes sin interpretar","Son iguales","Binario es solo imágenes","Texto solo admite ASCII"], a:0 },
    { q:"¿Qué hace un buffer?", o:["Almacena temporalmente datos para optimizar lectura/escritura","Elimina archivos","Comprueba permisos","Bloquea hilos"], a:0 },
    { q:"¿Qué es un FileInputStream?", o:["Un stream de salida","Un stream para leer bytes desde un fichero","Un parser XML","Un hilo del sistema"], a:1 },
    { q:"¿Qué es un FileReader?", o:["Lee caracteres (texto) aplicando codificación","Lee bytes sin interpretar","Escribe texto","Convierte JSON"], a:0 },
    { q:"¿Qué hace FileWriter?", o:["Escribe texto (caracteres) con codificación","Lee texto","Escribe bytes","Descarga archivos"], a:0 },
    { q:"¿Qué ocurre si no cierras un stream?", o:["Nada","Puede quedar archivo bloqueado y recursos sin liberar","Compila más rápido","No afecta al programa"], a:1 },
    { q:"¿Qué es try‑with‑resources?", o:["Un bucle","Un mecanismo de Java que cierra streams automáticamente","Una clase de hilos","Una herramienta de testing"], a:1 },
    { q:"¿Qué ventaja tienen los buffers (BufferedReader/Writer)?", o:["Son más lentos","Reducen accesos a disco, mejorando rendimiento","Solo funcionan en Linux","Obligan a usar ASCII"], a:1 },
    { q:"¿Qué hace flush()?", o:["Limpia memoria","Fuerza a escribir datos pendientes del buffer","Cierra archivo","Elimina contenido"], a:1 },
    { q:"¿Qué es un Path en NIO?", o:["Un objeto que representa una ruta de fichero/directorio","Un id de BD","Un thread","Un byte[]"], a:0 },
    { q:"Ventaja de NIO2 frente a IO clásico:", o:["Menos funcionalidades","Más errores","Más operaciones asíncronas y mejor gestión de rutas","Solo sirve para Windows"], a:2 }
  ]
};

let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta "+(i+1)+" / "+QUIZ.items.length;
  document.getElementById("points").textContent=points;
  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;
  const box=document.getElementById("options");
  box.innerHTML="";
  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";
  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'io' });
      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnBox = document.getElementById("btn-container");
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  btnBox.appendChild(volver);
}

mostrar();
</script>
</body>
</html>
