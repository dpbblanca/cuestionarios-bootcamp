<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel del Profesor</title>

<style>
  body{background:#0f172a;color:#e2e8f0;font-family:Arial;margin:0;padding:24px;}
  h1{color:#7dd3fc;font-size:32px;margin:0 0 16px;}
  .btn{display:inline-block;background:#0284c7;color:white;text-decoration:none;padding:10px 14px;border-radius:8px;margin:6px 10px 16px 0;}
  .btn:hover{background:#38bdf8;}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:8px 0 18px;}
  .card{background:#1e293b;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px;}
  .big{font-size:28px;font-weight:bold;color:#7dd3fc;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  table{width:100%;border-collapse:collapse;}
  th,td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.1);font-size:14px;}
  th{color:#7dd3fc;text-align:left;}
</style>
</head>
<body>

<h1>📊 Panel del Profesor</h1>

index.html⬅ Volver al menú</a>
panel.html⟲ Actualizar</a>

<div class="cards">
  <div class="card"><div>Total intentos</div><div class="big" id="kpi-intentos">0</div></div>
  <div class="card"><div>Media puntos</div><div class="big" id="kpi-media-p">0</div></div>
  <div class="card"><div>Media aciertos</div><div class="big" id="kpi-media-a">0</div></div>
</div>

<div class="grid">
  <div class="card">
    <h3>🏆 Ranking (Top 20 por media de puntos)</h3>
    <table id="tbl-ranking">
      <thead><tr><th>Alumno</th><th>Intentos</th><th>Media Pts</th><th>Media Ac.</th></tr></thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="card">
    <h3>📈 Medias por cuestionario</h3>
    <canvas id="ch-quizzes" height="160"></canvas>
  </div>
</div>

<div class="card" style="margin-top:16px;">
  <h3>🧾 Últimos resultados</h3>
  <table id="tbl-ultimos">
    <thead><tr><th>Fecha</th><th>Alumno</th><th>Quiz</th><th>Aciertos</th><th>Puntos</th></tr></thead>
    <tbody></tbody>
  </table>
</div>

<!-- Chart.js desde CDN para la gráfica -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const API = 'http://localhost:5050';

// KPIs + ranking + medias por quiz
async function loadResumen(){
  const r = await fetch(API + '/api/resumen');
  const j = await r.json();

  // KPIs
  document.getElementById('kpi-intentos').textContent = j.totales ?? 0;
  document.getElementById('kpi-media-p').textContent  = (j.media_puntos ?? 0).toFixed ? j.media_puntos.toFixed(1) : j.media_puntos;
  document.getElementById('kpi-media-a').textContent  = (j.media_aciertos ?? 0).toFixed ? j.media_aciertos.toFixed(1) : j.media_aciertos;

  // Ranking
  const rb = document.querySelector('#tbl-ranking tbody');
  rb.innerHTML = '';
  (j.ranking || []).forEach(row=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${row.nombre}</td><td>${row.intentos}</td>
                    <td>${row.media_pts}</td><td>${row.media_ac}</td>`;
    rb.appendChild(tr);
  });

  // Gráfica medias por cuestionario
  const labels = (j.por_quiz || []).map(x=>x.cuestionario);
  const dataP  = (j.por_quiz || []).map(x=>x.media_pts);
  if(window._chQ) window._chQ.destroy();
  const ctx = document.getElementById('ch-quizzes').getContext('2d');
  window._chQ = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets:[ {label:'Media puntos', data:dataP, backgroundColor:'#7dd3fc' } ] },
    options:{ responsive:true, scales:{ y:{ beginAtZero:true } } }
  });
}

// Últimos resultados
async function loadUltimos(){
  const r = await fetch(API + '/api/resultados');
  const j = await r.json();
  const tbody = document.querySelector('#tbl-ultimos tbody');
  tbody.innerHTML='';
  (j || []).forEach(x=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${x.fecha_hora}</td><td>${x.nombre}</td><td>${x.cuestionario}</td>
                    <td>${x.aciertos}</td><td>${x.puntos}</td>`;
    tbody.appendChild(tr);
  });
}

(async function init(){
  await loadResumen();
  await loadUltimos();
})();
</script>

</body>
</html>
