<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Git</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }
  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🔧 Cuestionario · Git</h1>
  <p class="sub">Commits · Branches · Merge · Rebase · Remotos · Stash · Etiquetas</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <!-- El botón “Volver al inicio” se añade por JS (infalible) -->
  </div>

</div>

<script>
// ==============================
//           PREGUNTAS GIT
// ==============================
const QUIZ = {
  meta: { title:"Git" },
  items: [
    { q:"¿Qué comando inicializa un repositorio Git en una carpeta?",
      o:["git start",".git init","git init","git repository init"], a:2 },

    { q:"¿Qué comando añade archivos al área de preparación (staging)?",
      o:["git add","git stage add","git commit --add","git push --stage"], a:0 },

    { q:"¿Qué comando crea un commit con los cambios del staging area?",
      o:["git save","git commit","git push","git stash"], a:1 },

    { q:"¿Qué hace 'git status'?",
      o:["Muestra el historial de commits","Muestra estado de staging y archivos modificados","Compara dos ramas","Elimina archivos sin seguimiento"], a:1 },

    { q:"¿Cómo creas y cambias a una rama nueva llamada 'feature'?",
      o:["git branch feature && git checkout feature","git checkout -b feature","git switch -c feature","Cualquiera de las anteriores"], a:3 },

    { q:"¿Qué comando fusiona la rama 'feature' en la rama actual?",
      o:["git combine feature","git merge feature","git rebase feature","git attach feature"], a:1 },

    { q:"¿Qué diferencia hay entre merge y rebase (en general)?",
      o:["merge reescribe historia, rebase crea merge commits","merge integra con merge commit; rebase reescribe y aplica commits sobre otra base","no hay diferencia","rebase solo funciona en repos remotos"], a:1 },

    { q:"¿Qué comando muestra el historial de commits?",
      o:["git history","git log","git reflog","git show-all"], a:1 },

    { q:"¿Qué hace 'git stash'?",
      o:["Guarda cambios locales temporalmente y limpia el working directory","Elimina cambios locales permanentemente","Sube los cambios al remoto","Crea una etiqueta del estado actual"], a:0 },

    { q:"¿Cómo conectas tu repo local a un remoto?",
      o:["git remote add origin <URL>","git add remote <URL>","git origin set <URL>","git upstream add <URL>"], a:0 },

    { q:"¿Qué comando sube cambios al remoto 'origin' en la rama actual?",
      o:["git push origin HEAD","git upload","git send","git export"], a:0 },

    { q:"¿Cómo traes y fusionas cambios del remoto en la rama actual?",
      o:["git pull","git fetch","git clone","git import"], a:0 },

    { q:"¿Cómo descargas referencias remotas sin fusionar automáticamente?",
      o:["git pull","git fetch","git rebase","git sync"], a:1 },

    { q:"¿Qué comando crea una etiqueta anotada 'v1.0'?",
      o:["git tag v1.0","git tag -a v1.0 -m \"versión 1.0\"","git tag create v1.0","git label v1.0"], a:1 },

    { q:"¿Qué archivo se usa para ignorar ficheros en el repo?",
      o:[".gitconfig",".gitignore",".gitkeep",".gitcache"], a:1 }
  ]
};

// ==============================
//             MOTOR
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//             FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";

  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent   = hits;
  document.getElementById("r_total").textContent  = QUIZ.items.length;

  // Enviar resultados al Microsoft Forms
  enviarResultadosMicrosoftForms();

  // Botón infalible creado por JS
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  res.appendChild(volver);
}

// ==============================
//   ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl =
    "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  // IDs de tu Form: Nombre | Cuestionario | Aciertos | Puntos | FechaHora
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl, { method:"POST", mode:"no-cors", body:data });
}

// Arranque
mostrar();
</script>

</body>
</html>
