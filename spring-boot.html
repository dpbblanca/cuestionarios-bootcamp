<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Spring Boot</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }

  .wrap { width:100%; max-width:700px; }

  h1 {
    font-size:32px;
    text-align:center;
    color:var(--primary);
    margin:0 0 12px;
  }

  .sub {
    color:var(--muted);
    text-align:center;
    margin:0 0 20px;
  }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext {
    font-size:20px;
    font-weight:700;
    margin-bottom:14px;
  }

  .opt {
    width:100%;
    padding:14px;
    margin:8px 0;
    background:#334155;
    border:none;
    border-radius:12px;
    color:white;
    cursor:pointer;
    font-size:16px;
    text-align:left;
    transition:background .2s, transform .15s;
  }

  .opt:hover {
    background:#475569;
    transform:translateX(4px);
  }

  .row {
    display:flex;
    justify-content:space-between;
    margin-top:8px;
    color:var(--muted);
  }

  .points b { color:var(--primary); }

  .result {
    margin-top:20px;
    padding:24px;
    text-align:center;
    background:#1e293b;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block;
    padding:12px 20px;
    background:#0284c7;
    border-radius:10px;
    margin-top:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:.2s;
  }

  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

<h1>🚀 Cuestionario · Spring Boot</h1>
<p class="sub">Auto‑configuración · Starters · REST · JPA · Actuator</p>

<div class="card" id="quiz-card">
  <div id="qtext">Cargando…</div>
  <div id="options"></div>

  <div class="row">
    <div id="counter">Pregunta 0/0</div>
    <div class="points">Puntos: <b id="points">0</b></div>
  </div>
</div>

<div class="result" id="result" style="display:none;">
  <h2>🎉 ¡Has terminado!</h2>
  <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
  <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
  <!-- Botón se añade automáticamente -->
</div>

</div>

<script>
// ==============================
//       PREGUNTAS SPRING BOOT
// ==============================
const QUIZ = {
  meta: { title:"Spring Boot" },
  items: [

    { q:"¿Cuál es uno de los objetivos principales de Spring Boot?",
      o:["Eliminar Java","Crear microservicios sin Spring","Simplificar configuración y arranque","Reemplazar Spring MVC"], a:2 },

    { q:"¿Qué son los 'starters' de Spring Boot?",
      o:["Plugins para CSS","Dependencias preconfiguradas","Servicios cloud","Scripts de despliegue"], a:1 },

    { q:"¿Qué archivo usa Spring Boot para configuraciones?",
      o:["boot.xml","server.conf","application.properties o .yml","config.json"], a:2 },

    { q:"¿Qué anotación arranca una aplicación Spring Boot?",
      o:["@SpringBootStart","@BootApp","@SpringBootApplication","@EnableBoot"], a:2 },

    { q:"¿Qué hace el Actuator?",
      o:["Gestiona logs","Permite endpoints de monitorización","Compila el proyecto","Gestiona base de datos"], a:1 },

    { q:"¿Qué dependencia se usa para construir APIs REST?",
      o:["spring‑boot‑starter‑rest","spring‑boot‑starter‑web","spring‑mvc‑rest","spring‑boot‑api"], a:1 },

    { q:"¿Qué anotación se usa para un controlador REST?",
      o:["@Service","@RestController","@Bean","@Primary"], a:1 },

    { q:"¿Qué anotación mapea una ruta GET?",
      o:["@GetRoute","@RouteGet","@GetMapping","@MapGet"], a:2 },

    { q:"¿Qué módulo facilita trabajar con JPA?",
      o:["spring‑data‑jpa","spring‑boot‑starter‑actuator","spring‑security","spring‑messaging"], a:0 },

    { q:"¿Qué anotación identifica la PK de una entidad?",
      o:["@PrimaryKey","@Id","@Key","@PK"], a:1 },

    { q:"¿Qué hace Spring Boot DevTools?",
      o:["Hot reload y mejoras en desarrollo","Corre tests automáticamente","Reduce tamaño del JAR","Documenta APIs"], a:0 },

    { q:"¿Qué anotación marca una clase como entidad JPA?",
      o:["@Entity","@JpaData","@Model","@DataEntity"], a:0 }
  ]
};

// ==============================
//         MOTOR DEL QUIZ
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//            FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display = "none";

  const res = document.getElementById("result");
  res.style.display = "block";

  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent   = hits;
  document.getElementById("r_total").textContent  = QUIZ.items.length;

  enviarResultadosMicrosoftForms();

  // Botón infalible
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  res.appendChild(volver);
}

// ==============================
//   ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){

  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl =
    "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  // Campos de tu Form:
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl, { method:"POST", mode:"no-cors", body:data });
}

// Iniciar cuestionario
mostrar();
</script>

</body>
</html>
