<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Testing</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }
  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🧪 Cuestionario · Testing</h1>
  <p class="sub">Unit · Integration · E2E · TDD/BDD · Coverage · Dobles de prueba</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <!-- El botón “Volver al inicio” lo añadimos por JS para que no pueda romperse -->
  </div>

</div>

<script>
// ==============================
//          PREGUNTAS TESTING
// ==============================
const QUIZ = {
  meta: { title:"Testing" },
  items: [
    { q:"¿Qué define mejor un test unitario?",
      o:["Valida todo el sistema de extremo a extremo","Valida una unidad de código aislada (p.ej. una función/clase)","Valida la integración con servicios externos en entorno real","Valida rendimiento bajo alta carga"], a:1 },

    { q:"¿Qué es un test de integración?",
      o:["Prueba una unidad aislada con dobles de prueba","Prueba la interacción entre varios módulos/servicios reales o simulados","Prueba la UI con un navegador real","Prueba solo la base de datos"], a:1 },

    { q:"¿Qué es un test end‑to‑end (E2E)?",
      o:["Prueba una función en memoria","Prueba desde la interfaz hasta el almacenamiento, como lo haría un usuario","Prueba únicamente el backend","Prueba la documentación"], a:1 },

    { q:"Orden recomendado de la pirámide de tests (de más a menos cantidad):",
      o:["E2E → Integración → Unit","Unit → Integración → E2E","Integración → Unit → E2E","Cualquiera, no hay recomendaciones"], a:1 },

    { q:"¿Qué es TDD?",
      o:["Desarrollar primero la implementación y luego los tests","Escribir primero el test que falla y después el código que lo hace pasar","Hacer pruebas manuales de regresión","Medir cobertura antes de codificar"], a:1 },

    { q:"En TDD, la secuencia correcta es:",
      o:["Refactor → Red → Green","Green → Red → Refactor","Red → Green → Refactor","Red → Refactor → Green"], a:2 },

    { q:"Cobertura de código (coverage) del 100% implica…",
      o:["Ausencia de bugs","Que todo el comportamiento está validado","Que todas las líneas se ejecutaron al menos una vez, no garantiza ausencia de bugs","Que el rendimiento es óptimo"], a:2 },

    { q:"¿Qué es un *mock*?",
      o:["Un doble que registra llamadas reales a un servicio","Un doble que simula un colaborador y permite verificar interacciones","Un doble con datos reales de producción","Un test manual"], a:1 },

    { q:"¿Qué es un *stub*?",
      o:["Un doble que devuelve respuestas predefinidas sin verificar interacciones","Un sistema de logs","Un script de despliegue","Un driver de base de datos"], a:0 },

    { q:"BDD (Behavior‑Driven Development) se centra en…",
      o:["La arquitectura interna","El comportamiento esperado expresado en un lenguaje común (ej. Given‑When‑Then)","Solo pruebas de UI","Solo microservicios"], a:1 },

    { q:"Un buen test unitario debería ser…",
      o:["Lento y dependiente de red","Rápido, determinista y aislado","Impredecible para simular casos reales","Dependiente del orden de ejecución"], a:1 },

    { q:"¿Qué es una prueba de regresión?",
      o:["Probar una nueva feature sin mirar lo anterior","Detener el pipeline si hay fallos intermitentes","Verificar que cambios no rompen funcionalidades existentes","Solo medir performance"], a:2 }
  ]
};

// ==============================
//            MOTOR
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//            FINAL
// ==============================
function final(){
  // Mostrar resultados
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";

  // Pinta resultados
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent   = hits;
  document.getElementById("r_total").textContent  = QUIZ.items.length;

  // Enviar al Microsoft Forms
  enviarResultadosMicrosoftForms();

  // Botón “Volver al inicio” creado por JS (INFALIBLE)
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  res.appendChild(volver);
}

// ==============================
//   ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl =
    "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  // IDs confirmados de tu Form: Nombre | Cuestionario | Aciertos | Puntos | FechaHora
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl, { method:"POST", mode:"no-cors", body:data });
}

// Arranque
mostrar();
</script>

</body>
</html>
