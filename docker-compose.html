<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Docker Compose</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,0.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #e2e8f0;
    font-family: Arial, sans-serif;
    margin: 0; padding: 40px 20px;
    display: flex; justify-content: center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px;
    background:#0284c7; border-radius:10px;
    margin-top:18px; font-weight:bold; color:white;
    text-decoration:none; transition:.2s; cursor:pointer; border:0;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

<h1>🛠️ Cuestionario · Docker Compose</h1>
<p class="sub">Servicios · YAML · Multi‑contenedor</p>

<div class="card" id="quiz-card">
  <div id="qtext">Cargando…</div>
  <div id="options"></div>

  <div class="row">
    <div id="counter">Pregunta 0/0</div>
    <div class="points">Puntos: <b id="points">0</b></div>
  </div>
</div>

<div class="result" id="result" style="display:none;">
  <h2>🎉 ¡Has terminado!</h2>
  <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
  <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
  <div id="btn-container"></div>
</div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta: { title:"dockercompose" }, // Identificador para el match
  items: [
    { q:"¿Qué archivo utiliza Docker Compose para definir servicios?", o:["Dockerfile","docker-compose.txt","docker-compose.yml","services.config"], a:2 },
    { q:"¿Qué ventaja ofrece Docker Compose?", o:["Definir varios servicios en un solo archivo","Aumentar la velocidad","Reducir imágenes","Eliminar Dockerfile"], a:0 },
    { q:"¿Qué componente permite comunicación entre contenedores?", o:["Dockerfile","Red (network)","Registro","Docker logs"], a:1 },
    { q:"¿Qué extensión debe tener el archivo de configuración?", o:[".json",".yml",".conf",".xml"], a:1 },
    { q:"¿Qué hace 'docker-compose up'?", o:["Solo construye imágenes","Elimina contenedores","Inicia todos los servicios","Inicia solo BD"], a:2 },
    { q:"¿Qué archivo define la construcción de imágenes?", o:["Dockerfile","docker-compose.yml","config.json","setup.sh"], a:0 },
    { q:"Objetivo de los volúmenes", o:["Ejecutar contenedores","Persistir datos","Eliminar temporales","Crear redes"], a:1 },
    { q:"¿Qué servicio puede definirse en docker-compose.yml?", o:["Cron","Web + BD","Solo volúmenes","Solo imagen"], a:1 },
    { q:"¿Comando para reiniciar?", o:["docker start","docker stop","docker restart","docker exec"], a:2 },
    { q:"¿Qué asegura persistencia?", o:["Red","Volumen","Puerto","Shell"], a:1 },
    { q:"¿Qué permite 'docker exec -it'?", o:["Detener contenedor","Entrar shell","Subir imagen","Construir"], a:1 },
    { q:"Ventaja de Compose", o:["Automatizar multi‑servicio","Reducir tamaño","Eliminar imágenes","Seguridad"], a:0 },
    { q:"¿Qué hace 'docker image rm'?", o:["Ejecutar imagen","Eliminar imagen","Mostrar procesos","Subir imágenes"], a:1 },
    { q:"Herramienta que define dependencias entre servicios", o:["Docker CLI","Docker Compose","Dockerfile","Volúmenes"], a:1 }
  ]
};

let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta " + (i+1) + " / " + QUIZ.items.length;
  document.getElementById("points").textContent = points;
  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;
  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = txt;
    b.onclick = ()=> responder(idx);
    box.appendChild(b);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent = hits;
  document.getElementById("r_total").textContent = QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'dockercompose' });

      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnContainer = document.getElementById("btn-container");
  const back = document.createElement("button");
  back.className = "btn";
  back.textContent = "⬅️ Volver al inicio";
  back.onclick = () => { location.href = "index.html"; };
  btnContainer.appendChild(back);
}

mostrar();
</script>
</body>
</html>
