<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Front‑end (HTML/CSS)</title>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color:#e2e8f0;
    font-family: Arial, sans-serif;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }
  .wrap { width:100%; max-width:700px; }
  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { color:var(--muted); text-align:center; margin:0 0 20px; }

  .card {
    background:var(--panel);
    padding:24px;
    border-radius:18px;
    box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext { font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt {
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover { background:#475569; transform:translateX(4px); }

  .row { display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b { color:var(--primary); }

  .result {
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn {
    display:inline-block; padding:12px 20px;
    background:#0284c7; border-radius:10px;
    margin-top:18px; font-weight:bold; color:white;
    cursor:pointer; transition:.2s;
  }
  .btn:hover { background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🎨 Cuestionario · Front‑end (HTML/CSS)</h1>
  <p class="sub">Estructura HTML · Semántica · Selectores CSS · Box model · Layout</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <!-- El botón “Volver al inicio” lo añade JS para que no pueda romperse -->
  </div>

</div>

<script>
// ==============================
//    PREGUNTAS FRONT‑END (HTML/CSS)
// ==============================
const QUIZ = {
  meta: { title:"Front‑end (HTML/CSS)" },
  items: [
    // HTML básico / semántica
    { q:"¿Cuál es la etiqueta raíz en un documento HTML válido?",
      o:["<body>","<head>","<html>","<!DOCTYPE html>"], a:2 },

    { q:"¿Qué etiqueta es semántica para el contenido principal?",
      o:["<div class='main'>","<main>","<section>","<article>"], a:1 },

    { q:"¿Qué etiqueta se usa para navegación principal?",
      o:["<nav>","<menu>","<ul>","<aside>"], a:0 },

    { q:"¿Qué atributo HTML proporciona un texto alternativo para imágenes?",
      o:["title","label","alt","desc"], a:2 },

    { q:"¿Cuál es la etiqueta correcta para un párrafo?",
      o:["<p>","<txt>","<par>","<text>"], a:0 },

    // CSS selectores / especificidad
    { q:"El selector CSS '.card h2' selecciona…",
      o:["Todos los h2","Todos los .card","Los h2 dentro de .card","Los .card dentro de h2"], a:2 },

    { q:"¿Qué selector tiene más especificidad?",
      o:["h1","*.title",".title","#title"], a:3 },

    { q:"¿Qué hace ':hover' en CSS?",
      o:["Aplica estilos cuando se hace clic","Aplica estilos al pasar el ratón","Aplica estilos en móvil","Ninguna"], a:1 },

    // Box model / layout
    { q:"¿Qué propiedad define el espacio **externo** alrededor de un elemento?",
      o:["padding","margin","border","gap"], a:1 },

    { q:"El modelo de caja estándar **incluye** en 'width'…",
      o:["Contenido","Contenido + padding","Contenido + padding + border","Todo + margin"], a:0 },

    { q:"¿Qué hace 'box-sizing: border-box;'?",
      o:["Incluye padding y border dentro del width/height","Incluye margin en el width","Ignora padding","No tiene efecto"], a:0 },

    // Unidad / responsive
    { q:"¿Cuál de estas unidades **es relativa**?",
      o:["px","cm","mm","rem"], a:3 },

    { q:"¿Qué media query activa estilos desde 768px hacia arriba?",
      o:["@media (max-width: 768px)","@media (min-width: 768px)","@media screen=768px","@media (>=768px)"], a:1 },

    // Imágenes / accesibilidad
    { q:"Para accesibilidad, ¿qué **debe** acompañar a una imagen informativa?",
      o:["Un 'alt' descriptivo","Un 'title' con emojis","Un borde azul","Nada si es bonita"], a:0 },

    // Formularios
    { q:"¿Cuál es un control de formulario **semántico** para email?",
      o:["<input type='text'>","<input type='mail'>","<input type='email'>","<email>"], a:2 },

    // Tipografía
    { q:"¿Qué propiedad controla el interlineado?",
      o:["letter-spacing","line-height","text-indent","word-break"], a:1 },

    // Flex / Grid (intro)
    { q:"¿Cómo se activa un contenedor Flex?",
      o:["display: inline","display: flex","flex: 1","justify-content: flex"], a:1 },

    { q:"En CSS Grid, ¿qué crea 3 columnas iguales?",
      o:["grid-template-columns: 3 * 1fr","grid-template-columns: repeat(3, 1fr)","columns: 3","grid-columns: 3fr"], a:1 }
  ]
};

// ==============================
//           MOTOR
// ==============================
let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta " + (i+1) + " / " + QUIZ.items.length;

  document.getElementById("points").textContent = points;

  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;

  const box = document.getElementById("options");
  box.innerHTML = "";

  q.o.forEach((txt, idx)=>{
    const btn = document.createElement("button");
    btn.className = "opt";
    btn.textContent = txt;
    btn.onclick = ()=> responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points += 100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//            FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display = "none";
  const res = document.getElementById("result");
  res.style.display = "block";

  // Pinta resultados
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent   = hits;
  document.getElementById("r_total").textContent  = QUIZ.items.length;

  // Enviar al MS Forms
  enviarResultadosMicrosoftForms();

  // Botón infalible (creado por JS)
  const volver = document.createElement("button");
  volver.className = "btn";
  volver.textContent = "⬅️ Volver al inicio";
  volver.onclick = ()=>{ location.href = "index.html"; };
  res.appendChild(volver);
}

// ==============================
//    ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){
  let alumno = prompt("Introduce tu nombre para enviar los resultados al profesor:");

  const formUrl =
    "https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data = new FormData();
  // IDs ya confirmados contigo
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);             // Nombre
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);  // Cuestionario
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);             // Aciertos
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);           // Puntos
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString()); // FechaHora

  fetch(formUrl, { method:"POST", mode:"no-cors", body:data });
}

// Inicio
mostrar();
</script>

</body>
</html>
