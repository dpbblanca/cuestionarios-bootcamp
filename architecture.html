<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Arquitectura de Software</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { 
    --bg1:#0f172a; --bg2:#1e293b;
    --muted:#94a3b8; --primary:#7dd3fc; 
    --panel:rgba(30,41,59,0.85);
  }

  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }

  .wrap { width:100%; max-width:700px; }

  h1 { font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub { text-align:center; color:var(--muted); margin-bottom:20px; }

  .card{
    background:var(--panel); padding:24px;
    border-radius:18px; box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }
  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px;
    color:white; cursor:pointer; text-align:left; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border:1px solid rgba(255,255,255,.1);
  }

  .btn{
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px;
    font-weight:bold; color:white; cursor:pointer;
    transition:.2s; border:none; text-decoration: none;
  }

  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

  <h1>🏛️ Cuestionario · Arquitectura de Software</h1>
  <p class="sub">Monolito · Microservicios · APIs · Capas · Hexagonal · DDD · SOLID</p>

  <div class="card" id="quiz-card">
    <div id="qtext">Cargando…</div>
    <div id="options"></div>

    <div class="row">
      <div id="counter">Pregunta 0/0</div>
      <div class="points">Puntos: <b id="points">0</b></div>
    </div>
  </div>

  <div class="result" id="result" style="display:none;">
    <h2>🎉 ¡Has terminado!</h2>
    <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
    <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
    <div id="btn-container"></div>
  </div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta:{ title:"arquitectura" }, // Coincide con lo enviado desde index.html
  items:[
    { q:"¿Qué es un monolito?", o:["Un programa distribuido","Toda la lógica en un único despliegue/aplicación","Un clúster de microservicios","Un contenedor Docker"], a:1 },
    { q:"Los microservicios promueven…", o:["Base de datos única centralizada","Despliegues independientes y escalabilidad por servicio","Un único repositorio con todo el código","Acoplamiento fuerte"], a:1 },
    { q:"¿Qué suele representar una API REST?", o:["Una interfaz binaria","Una interfaz HTTP de recursos con operaciones (GET/POST/PUT/DELETE)","Un driver del sistema","Una app móvil"], a:1 },
    { q:"Arquitectura por capas clásica:", o:["UI → Lógica → Persistencia","Persistencia → UI → Lógica","Router → Kernel → UI","Microservicio → ETL"], a:0 },
    { q:"La arquitectura hexagonal enfatiza…", o:["Uso de herencia","Dominio en el centro y adaptadores/periféricos conectados por puertos","Dependencias circulares","Un único repositorio"], a:1 },
    { q:"DDD busca…", o:["Modelar el dominio con lenguaje ubicuo","Evitar hablar con negocio","Organizar el código por controladores","Usar SQL puro siempre"], a:0 },
    { q:"¿Qué principio SOLID sugiere depender de abstracciones?", o:["LSP","DIP","SRP","ISP"], a:1 },
    { q:"¿Qué es el patrón CQRS?", o:["Separación de comandos/escrituras y consultas/lecturas","Compresión de queries","Sincronización entre microservicios","Modelo de acceso a ficheros"], a:0 },
    { q:"Un evento de dominio es…", o:["Un error en sistema","Una notificación de navegación","Algo que ocurrió en el dominio y que interesa comunicar","Un ping del servidor"], a:2 },
    { q:"Un endpoint suele mapear…", o:["Operaciones de usuario específicas","URLs que representan operaciones o recursos","Comandos de shell","Mensajes de red TCP"], a:1 },
    { q:"Un anti‑pattern común:", o:["Alta cohesión","Baja cohesión y alto acoplamiento","DDD bien aplicado","Separación clara entre infraestructura y dominio"], a:1 },
    { q:"Una ventaja de microservicios:", o:["Despliegues independientes","Código siempre más simple","Menos red","Nunca hay latencia"], a:0 }
  ]
};

let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta "+(i+1)+" / "+QUIZ.items.length;
  document.getElementById("points").textContent = points;
  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;
  const box=document.getElementById("options");
  box.innerHTML="";
  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";
  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'arquitectura' });

      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnContainer = document.getElementById("btn-container");
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  btnContainer.appendChild(volver);
}

mostrar();
</script>
</body>
</html>
