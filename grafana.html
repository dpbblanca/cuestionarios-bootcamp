<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · Grafana</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root { --bg1:#0f172a; --bg2:#1e293b; --muted:#94a3b8; --primary:#7dd3fc; --panel:rgba(30,41,59,.85); }
  body {
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    color: #e2e8f0;
    font-family: Arial, sans-serif;
    margin: 0; padding: 40px 20px;
    display: flex; justify-content: center;
  }
  .wrap{ width:100%; max-width:700px; }
  h1{ font-size:32px; text-align:center; margin:0 0 12px; color:var(--primary); }
  .sub{ color:var(--muted); text-align:center; margin:0 0 20px; }

  .card{
    background: var(--panel);
    padding: 24px;
    border-radius: 18px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px; color:white;
    text-align:left; cursor:pointer; font-size:16px;
    transition:background .2s, transform .15s;
  }
  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px; text-align:center;
    background:#1e293b; border-radius:12px;
    border: 1px solid rgba(255,255,255,.1);
  }

  .btn{
    display:inline-block; padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px; font-weight:bold; color:white;
    text-decoration:none; transition:background .2s;
    cursor:pointer; border: none;
  }
  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>
<div class="wrap">

<h1>📊 Cuestionario · Grafana</h1>
<p class="sub">Dashboards · Observabilidad · Métricas</p>

<div class="card" id="quiz-card">
  <div id="qtext">Cargando…</div>
  <div id="options"></div>

  <div class="row">
    <div id="counter">Pregunta 0/0</div>
    <div class="points">Puntos: <b id="points">0</b></div>
  </div>
</div>

<div class="result" id="result" style="display:none;">
  <h2>🎉 ¡Has terminado!</h2>
  <p style="font-size:20px">Puntuación total: <b id="r_points"></b></p>
  <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
  <div id="btn-container"></div>
</div>

</div>

<script>
// --- CONFIGURACIÓN SUPABASE ---
const SUPABASE_URL = 'https://anmfsgtelpkqsuulkwhn.supabase.co';
const SUPABASE_KEY = 'sb_publishable_iRqF06RhsKFV1HJPiM8Nnw_MrHgbC9D';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const QUIZ = {
  meta: { title:"grafana" }, // Identificador para el match
  items: [
    { q:"¿Qué herramienta se utiliza principalmente para crear dashboards con múltiples orígenes de datos?", o:["Logstash","Kibana","Apache Superset","Grafana"], a:3 },
    { q:"¿Qué destaca de Grafana?", o:["Solo SQL","No alertas","Múltiples fuentes de datos","Solo logs"], a:2 },
    { q:"¿Qué tipo de datos puede mostrar Grafana?", o:["Solo logs","Solo CPU","Gráficos/tablas/etc","Solo OS"], a:2 },
    { q:"¿Qué sistemas operativos soporta?", o:["Windows","Linux","Muchos sistemas","Android"], a:2 },
    { q:"¿Cuál es uno de los puntos fuertes?", o:["Audio","Reconocimiento","Multi‑origen","Compilar"], a:2 },
    { q:"Grafana es…", o:["BD","Observabilidad","Cloud","Lenguaje"], a:1 },
    { q:"Característica de Grafana", o:["Encriptación","Alertas","Almacenamiento","ML"], a:1 },
    { q:"¿Qué es una plantilla en Grafana?", o:["Estática","Variables","Fuente","PDF"], a:1 },
    { q:"Grafana vs Kibana", o:["Métricas vs logs","Libre vs no","Visualiza vs ingesta","Son iguales"], a:0 },
    { q:"Las métricas son…", o:["Cualitativas","Cuantitativas","Logs","Feedback"], a:1 }
  ]
};

let i = 0, points = 0, hits = 0;

function mostrar(){
  document.getElementById("counter").textContent = "Pregunta " + (i+1) + " / " + QUIZ.items.length;
  document.getElementById("points").textContent = points;
  const q = QUIZ.items[i];
  document.getElementById("qtext").textContent = q.q;
  const box = document.getElementById("options");
  box.innerHTML = "";
  q.o.forEach((txt, idx)=>{
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = txt;
    b.onclick = ()=> responder(idx);
    box.appendChild(b);
  });
}

function responder(idx){
  if(idx === QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i >= QUIZ.items.length){ final(); return; }
  mostrar();
}

async function final(){
  document.getElementById("quiz-card").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("r_points").textContent = points;
  document.getElementById("r_hits").textContent = hits;
  document.getElementById("r_total").textContent = QUIZ.items.length;

  // --- ACTUALIZACIÓN AUTOMÁTICA EN SUPABASE ---
  const nombreGuardado = localStorage.getItem('alumnoActivo');
  
  if (nombreGuardado) {
      const { error } = await _supabase
          .from('resultados')
          .update({ nota: points })
          .match({ alumno: nombreGuardado, examen: 'grafana' });

      if (error) console.error("Error al actualizar nota:", error);
  }

  const btnContainer = document.getElementById("btn-container");
  const back = document.createElement("button");
  back.className = "btn";
  back.textContent = "⬅️ Volver al inicio";
  back.onclick = () => { location.href = "index.html"; };
  btnContainer.appendChild(back);
}

mostrar();
</script>
</body>
</html>
