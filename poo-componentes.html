<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cuestionario · POO por Componentes</title>

<style>
  :root { 
    --bg1:#0f172a; --bg2:#1e293b;
    --muted:#94a3b8; --primary:#7dd3fc; 
    --panel:rgba(30,41,59,0.85);
  }

  body {
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    color:#e2e8f0; font-family: Arial;
    margin:0; padding:40px 20px;
    display:flex; justify-content:center;
  }

  .wrap { width:100%; max-width:700px; }

  h1 { font-size:32px; text-align:center; color:var(--primary); margin:0 0 12px; }
  .sub { text-align:center; color:var(--muted); margin-bottom:20px; }

  .card{
    background:var(--panel); padding:24px;
    border-radius:18px; box-shadow:0 10px 24px rgba(0,0,0,0.45);
    backdrop-filter:blur(6px);
  }

  #qtext{ font-size:20px; font-weight:700; margin-bottom:14px; }

  .opt{
    width:100%; padding:14px; margin:8px 0;
    background:#334155; border:none; border-radius:12px;
    color:white; cursor:pointer; text-align:left; font-size:16px;
    transition:background .2s, transform .15s;
  }

  .opt:hover{ background:#475569; transform:translateX(4px); }

  .row{ display:flex; justify-content:space-between; margin-top:8px; color:var(--muted); }
  .points b{ color:var(--primary); }

  .result{
    margin-top:20px; padding:24px;
    background:#1e293b; border-radius:12px;
    text-align:center; border:1px solid rgba(255,255,255,.1);
  }

  .btn{
    padding:12px 20px; background:#0284c7;
    border-radius:10px; margin-top:18px;
    font-weight:bold; color:white;
    cursor:pointer; transition:.2s; border:none;
  }
  .btn:hover{ background:#38bdf8; }
</style>
</head>

<body>

<div class="wrap">

<h1>🧩 Cuestionario · POO por Componentes</h1>
<p class="sub">Componentes / Cohesión / Acoplamiento / Composición / Delegación / SRP</p>

<div class="card" id="quiz-card">
  <div id="qtext">Cargando…</div>
  <div id="options"></div>

  <div class="row">
    <div id="counter">Pregunta 0/0</div>
    <div class="points">Puntos: <b id="points">0</b></div>
  </div>
</div>

<div class="result" id="result" style="display:none;">
  <h2>🎉 ¡Has terminado!</h2>
  <p style="font-size:20px;">Puntuación total: <b id="r_points"></b></p>
  <p>Aciertos: <b id="r_hits"></b> de <span id="r_total"></span></p>
</div>

</div>

<script>
// ==============================
//     PREGUNTAS POO COMPONENTES
// ==============================
const QUIZ = {
  meta:{ title:"POO por Componentes" },
  items:[
    { q:"Un componente en POO…",
      o:["Es una clase aislada sin dependencias","Es una unidad reutilizable, encapsulada y con responsabilidad clara","Es cualquier archivo","Es solo una interfaz"], a:1 },

    { q:"La cohesión se refiere a…",
      o:["Cuánto se relacionan entre sí las responsabilidades de un componente","Número de dependencias externas","Velocidad de ejecución","Herencia múltiple"], a:0 },

    { q:"El acoplamiento mide…",
      o:["La independencia entre componentes","El tamaño del código","Los métodos privados","La complejidad ciclomática"], a:0 },

    { q:"¿Qué buscamos en diseño por componentes?",
      o:["Bajo acoplamiento y alta cohesión","Alto acoplamiento y baja cohesión","Código duplicado","Dependencias circulares"], a:0 },

    { q:"La composición es…",
      o:["Una forma de herencia","Construir funcionalidades combinando objetos internos","Un patrón Singleton","Mapeo BD"], a:1 },

    { q:"Delegación significa…",
      o:["Que una clase hereda métodos","Que una clase deriva responsabilidad a otra","Clonar objetos","Convertir clases en interfaces"], a:1 },

    { q:"¿Qué principio dice que cada módulo debe tener una única responsabilidad?",
      o:["OCP","SRP","DIP","LSP"], a:1 },

    { q:"Un componente bien diseñado tiene…",
      o:["Interface clara y dependencias controladas","Muchos métodos públicos","Variables globales","Dependencias ocultas"], a:0 },

    { q:"¿Qué es una interfaz de componente?",
      o:["Código interno","La forma en que otros interactúan con el componente","Un hook del sistema operativo","Una clase abstracta siempre"], a:1 },

    { q:"La inversión de dependencias promueve…",
      o:["Depender de implementaciones concretas","Dependencias de alto nivel hacia abstracciones","Ciclos en el grafo de dependencias","Dependencias unidireccionales siempre"], a:1 },

    { q:"¿Qué es un *component graph* o grafo de componentes?",
      o:["Un esquema de BD","Un mapa de cómo se relacionan componentes entre sí","Un test unitario","Un modelo de seguridad"], a:1 },

    { q:"¿Qué ventaja tiene la composición sobre la herencia?",
      o:["Reduce flexibilidad","Aumenta el acoplamiento","Evita jerarquías rígidas y favorece la reutilización","Debe usarse siempre en vez de herencia"], a:2 }
  ]
};

// ==============================
//             MOTOR QUIZ
// ==============================
let i=0, points=0, hits=0;

function mostrar(){
  document.getElementById("counter").textContent =
    "Pregunta "+(i+1)+" / "+QUIZ.items.length;

  document.getElementById("points").textContent=points;

  const q=QUIZ.items[i];
  document.getElementById("qtext").textContent=q.q;

  const box=document.getElementById("options");
  box.innerHTML="";

  q.o.forEach((txt,idx)=>{
    const btn=document.createElement("button");
    btn.className="opt";
    btn.textContent=txt;
    btn.onclick=()=>responder(idx);
    box.appendChild(btn);
  });
}

function responder(idx){
  if(idx===QUIZ.items[i].a){ points+=100; hits++; }
  i++;
  if(i>=QUIZ.items.length){ final(); return; }
  mostrar();
}

// ==============================
//              FINAL
// ==============================
function final(){
  document.getElementById("quiz-card").style.display="none";
  const res=document.getElementById("result");
  res.style.display="block";

  document.getElementById("r_points").textContent=points;
  document.getElementById("r_hits").textContent=hits;
  document.getElementById("r_total").textContent=QUIZ.items.length;

  enviarResultadosMicrosoftForms();

  // Botón regreso (INFALIBLE)
  const volver=document.createElement("button");
  volver.className="btn";
  volver.textContent="⬅️ Volver al inicio";
  volver.onclick=()=>{ location.href="index.html"; };
  res.appendChild(volver);
}

// ==============================
//    ENVÍO A MICROSOFT FORMS
// ==============================
function enviarResultadosMicrosoftForms(){

  let alumno=prompt("Introduce tu nombre para enviar los resultados:");

  const formUrl=
"https://forms.office.com/Pages/ResponsePage.aspx?id=ngQeNX4HTkSgrjTR0Ryhv5lfEUnAIIdAvpBD2nxYPONURDNDVElLWEFJUFFWOTZTVERSQk9BQjlDMC4u";

  const data=new FormData();
  data.append("rf01a18cc054f44dd84d73f76b3c6810f", alumno);
  data.append("rc6bf3a21d86842518d65daed218afaf5", QUIZ.meta.title);
  data.append("rc3d9c564eafa44f5a172beac5243902f", hits);
  data.append("r4ed2d12d0d9c412d94fc49d52057426d", points);
  data.append("r28d95b8810384a15ba1172f72c59bb2f", new Date().toLocaleString());

  fetch(formUrl,{method:"POST",mode:"no-cors",body:data});
}

// start
mostrar();
</script>

</body>
</html>
